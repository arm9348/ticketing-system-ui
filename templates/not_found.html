{% extends "base.html" %}

{% block title %}Not Found{% endblock %}

{% block content %}
<div class="card">
    <h2>{{ item_name }} Not Found</h2>
    <p>The requested {{ item_name.lower() }} could not be found.</p>
    <p><a href="{{ url_for('tickets_list') }}">Return to the ticket list</a></p>
</div>
{% endblock %}
