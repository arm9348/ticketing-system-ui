<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Helpdesk{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
            color: #222;
        }
        header, main, footer {
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px;
        }
        nav a {
            margin-right: 14px;
        }
        .card {
            background: #fff;
            border: 1px solid #ddd;
            padding: 16px;
            margin-bottom: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        form.inline {
            display: inline;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, select, textarea, button {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            box-sizing: border-box;
        }
        .actions a, .actions button {
            display: inline-block;
            width: auto;
            margin-right: 8px;
        }
        .errors {
            background: #fdecea;
            border: 1px solid #f5b7b1;
            padding: 12px;
            margin-bottom: 16px;
        }
        .meta {
            color: #555;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Helpdesk Ticket Management</h1>
        <nav>
            <a href="{{ url_for('tickets_list') }}">Tickets</a>
            <a href="{{ url_for('tickets_new') }}">Create Ticket</a>
            <a href="{{ url_for('reports') }}">Reports</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p class="meta">Student prototype built with Flask, Jinja, and MariaDB.</p>
    </footer>
</body>
</html>
